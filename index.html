<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>NIO Partners – Executive Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Cormorant+Garamond:wght@500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --nio-dark: #1a1c18; 
            --nio-gold: #c4963a; 
            --nio-green: #4a6741; 
            --nio-text: #e5e7eb;
            --surface: #242622;
            --border: #3a3d37;
        }
        body { font-family: 'Inter', sans-serif; background: var(--nio-dark); color: var(--nio-text); margin: 0; padding: 40px; }
        .container { max-width: 1400px; margin: auto; }
        
        header { 
            display: flex; justify-content: space-between; align-items: flex-end;
            padding-bottom: 20px; border-bottom: 1px solid var(--nio-gold); margin-bottom: 40px;
        }
        .header-left h1 { margin: 0; font-family: 'Cormorant Garamond'; font-size: 32px; letter-spacing: 2px; color: var(--nio-gold); text-transform: uppercase; }
        .header-left p { margin: 5px 0 0; font-size: 11px; letter-spacing: 3px; opacity: 0.7; text-transform: uppercase; }
        .header-right .date { font-family: 'Cormorant Garamond'; font-size: 28px; color: var(--nio-gold); }

        .section-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; margin-bottom: 40px; }
        .section-title { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: var(--nio-gold); margin-bottom: 15px; border-left: 2px solid var(--nio-gold); padding-left: 10px; }

        /* Timelines */
        .card { background: var(--surface); padding: 25px; border: 1px solid var(--border); }
        .timeline { display: flex; justify-content: space-between; position: relative; margin-top: 10px; }
        .timeline::before { content: ''; position: absolute; top: 15px; left: 10%; right: 10%; height: 1px; background: var(--border); }
        .step { position: relative; z-index: 1; text-align: center; flex: 1; }
        .dot { width: 10px; height: 10px; background: var(--nio-dark); border: 2px solid var(--border); border-radius: 50%; margin: 0 auto 10px; }
        .dot.done { background: var(--nio-green); border-color: var(--nio-green); box-shadow: 0 0 8px var(--nio-green); }
        .dot.active { background: var(--nio-gold); border-color: var(--nio-gold); box-shadow: 0 0 8px var(--nio-gold); }
        .step-label { font-size: 9px; text-transform: uppercase; opacity: 0.6; }

        /* KPI Tiles */
        .tile-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 50px; }
        .tile { background: var(--surface); border: 1px solid var(--border); transition: 0.3s; }
        .tile-header { padding: 40px 20px; text-align: center; cursor: pointer; }
        .tile-val { font-family: 'Cormorant Garamond'; font-size: 64px; color: var(--nio-gold); line-height: 1; }
        .tile-label { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; margin-top: 10px; opacity: 0.5; }
        
        /* Scrolling List für KPI & Charts */
        .scroll-area { display: none; padding: 0 20px 20px; max-height: 300px; overflow-y: auto; border-top: 1px solid var(--border); background: rgba(0,0,0,0.1); }
        .scroll-area::-webkit-scrollbar { width: 4px; }
        .scroll-area::-webkit-scrollbar-thumb { background: var(--nio-gold); }
        
        table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 15px; }
        td { padding: 10px 0; border-bottom: 1px solid var(--border); color: var(--nio-text); }

        /* Chart Layout */
        .chart-card { background: var(--surface); padding: 30px; border: 1px solid var(--border); }
        .chart-flex { display: flex; align-items: center; justify-content: center; min-height: 300px; }
        .chart-wrapper { width: 240px; height: 240px; position: relative; }
        
        .chart-legend { margin-left: 40px; flex: 1; }
        .legend-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 12px; cursor: pointer; }
        .legend-item:hover { color: var(--nio-gold); }
        .legend-color { width: 8px; height: 8px; border-radius: 50%; margin-right: 12px; }
        .legend-pct { font-weight: 600; color: var(--nio-gold); }

        .chart-detail-view { display: none; margin-top: 25px; border-top: 1px solid var(--nio-gold); padding-top: 15px; max-height: 400px; overflow-y: auto; }
        .chart-detail-view::-webkit-scrollbar { width: 4px; }
        .chart-detail-view::-webkit-scrollbar-thumb { background: var(--nio-gold); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="header-left">
            <h1>CIP Infrastructure VI</h1>
            <p>Zurich Roundtable Outreach Dashboard</p>
        </div>
        <div class="header-right">
            <div class="date">15 April 2025</div>
        </div>
    </header>

    <div class="section-grid">
        <div>
            <div class="section-title">Timeline Batch 1</div>
            <div class="card">
                <div class="timeline">
                    <div class="step"><div class="dot done"></div><div class="step-label">Invite</div></div>
                    <div class="step"><div class="dot done"></div><div class="step-label">FU 1</div></div>
                    <div class="step"><div class="dot active"></div><div class="step-label">FU 2</div></div>
                    <div class="step"><div class="dot"></div><div class="step-label">FU 3</div></div>
                </div>
            </div>
        </div>
        <div>
            <div class="section-title">Timeline Batch 2</div>
            <div class="card">
                <div class="timeline">
                    <div class="step"><div class="dot done"></div><div class="step-label">Invite</div></div>
                    <div class="step"><div class="dot active"></div><div class="step-label">FU 1</div></div>
                    <div class="step"><div class="dot"></div><div class="step-label">FU 2</div></div>
                    <div class="step"><div class="dot"></div><div class="step-label">FU 3</div></div>
                </div>
            </div>
        </div>
    </div>

    <div class="tile-grid">
        <div class="tile">
            <div class="tile-header" onclick="toggle('acc')">
                <div class="tile-val">6</div>
                <div class="tile-label">Accepted</div>
            </div>
            <div id="acc" class="scroll-area"><table id="t-acc"></table></div>
        </div>
        <div class="tile">
            <div class="tile-header" onclick="toggle('dec')">
                <div class="tile-val" style="color: #a34b4b;">8</div>
                <div class="tile-label">Declined</div>
            </div>
            <div id="dec" class="scroll-area"><table id="t-dec"></table></div>
        </div>
        <div class="tile">
            <div class="tile-header" onclick="toggle('res')">
                <div class="tile-val" style="color: #666;">100</div>
                <div class="tile-label">The Rest</div>
            </div>
            <div id="res" class="scroll-area"><p style="font-size: 11px; opacity: 0.6; padding: 20px 0;">Pending Response</p></div>
        </div>
    </div>

    <div class="section-title">Client Mix & Detailed Lists</div>
    <div class="section-grid">
        <div class="chart-card">
            <div class="chart-flex">
                <div class="chart-wrapper"><canvas id="b1Chart"></canvas></div>
                <div id="b1Legend" class="chart-legend"></div>
            </div>
            <div id="b1Overlay" class="chart-detail-view"></div>
        </div>
        <div class="chart-card">
            <div class="chart-flex">
                <div class="chart-wrapper"><canvas id="b2Chart"></canvas></div>
                <div id="b2Legend" class="chart-legend"></div>
            </div>
            <div id="b2Overlay" class="chart-detail-view"></div>
        </div>
    </div>
</div>

<script>
    function toggle(id) {
        const el = document.getElementById(id);
        el.style.display = (el.style.display === "block") ? "none" : "block";
    }

    // Mock-Daten Generator (hier fügen Sie Ihre echten Excel-Daten ein)
    const genList = (pre, n) => Array.from({length: n}, (_, i) => `${pre} Company ${i + 1}`).sort();
    
    const db = {
        acc: ['Arabella FO', 'Avanea PK', 'Elisir Capital', 'Lombard Odier', 'Mutter AM', 'Amana'],
        dec: ['Avalor', 'Finad', 'VermögensPartner', 'Actieninvest', 'Oslo FO', 'Survista', 'Aretas', 'Invest-P'],
        batches: {
            b1: { MFO: genList('MFO', 51), IAM: genList('IAM', 27), SFO: genList('SFO', 21), Pension: genList('Pension', 9), Other: genList('Other', 6) },
            b2: { Pension: genList('Pension', 114), IAM: genList('IAM', 70) }
        }
    };

    const fillT = (id, list) => document.getElementById(id).innerHTML = list.map(n => `<tr><td>${n}</td></tr>`).join('');
    fillT('t-acc', db.acc);
    fillT('t-dec', db.dec);

    const colors = ['#4a6741', '#c4963a', '#2d3f57', '#6b7280', '#3a3d37'];

    // Plugin für die zentrierte Zahl im Pie Chart
    Chart.register({
        id: 'centerValue',
        afterDraw: (chart) => {
            if (chart.config.options.centerVal) {
                const {ctx, chartArea: {top, bottom, left, right}} = chart;
                ctx.save();
                ctx.font = "bold 32px 'Cormorant Garamond'";
                ctx.fillStyle = "#c4963a";
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(chart.config.options.centerVal, (left + right) / 2, (top + bottom) / 2);
                ctx.restore();
            }
        }
    });

    const setupChart = (canvasId, legendId, overlayId, batchKey, total) => {
        const data = db.batches[batchKey];
        const chart = new Chart(document.getElementById(canvasId), {
            type: 'doughnut',
            data: {
                labels: Object.keys(data),
                datasets: [{ data: Object.values(data).map(v => v.length), backgroundColor: colors, borderWidth: 0, cutout: '82%' }]
            },
            options: { centerVal: total, plugins: { legend: { display: false } }, maintainAspectRatio: false }
        });

        // Legende mit Prozenten & Klick-Funktion
        document.getElementById(legendId).innerHTML = Object.keys(data).map((label, i) => {
            const count = data[label].length;
            const pct = Math.round((count / total) * 100) + '%';
            return `<div class="legend-item" onclick="showList('${overlayId}', '${batchKey}', '${label}')">
                <div style="display:flex; align-items:center"><div class="legend-color" style="background:${colors[i]}"></div>${label}</div>
                <div class="legend-pct">${pct}</div>
            </div>`;
        }).join('');
    };

    window.showList = (overlayId, batchKey, label) => {
        const div = document.getElementById(overlayId);
        const list = db.batches[batchKey][label];
        div.style.display = "block";
        div.innerHTML = `<div style="font-size:10px; color:#c4963a; margin-bottom:12px; letter-spacing:1px;">${label} (TOTAL: ${list.length})</div>
            <table>${list.map(n => `<tr><td>${n}</td></tr>`).join('')}</table>`;
        div.scrollTop = 0;
    };

    setupChart('b1Chart', 'b1Legend', 'b1Overlay', 'b1', 114);
    setupChart('b2Chart', 'b2Legend', 'b2Overlay', 'b2', 184);
</script>
</body>
</html>
