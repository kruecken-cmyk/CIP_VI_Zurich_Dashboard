<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NIO Partners – Executive Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Cormorant+Garamond:wght@500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <style>
        :root {
            --nio-dark: #1a1c18; --nio-gold: #c4963a; --nio-green: #4a6741; 
            --nio-text: #e5e7eb; --surface: #242622; --border: #3a3d37;
            --decline-red: #a34b4b;
        }
        body { font-family: 'Inter', sans-serif; background: var(--nio-dark); color: var(--nio-text); margin: 0; padding: 40px; line-height: 1.5; }
        .container { max-width: 1300px; margin: auto; }
        
        header { display: flex; justify-content: space-between; align-items: flex-end; padding-bottom: 20px; border-bottom: 1px solid var(--nio-gold); margin-bottom: 40px; }
        .header-left h1 { margin: 0; font-family: 'Cormorant Garamond'; font-size: 32px; color: var(--nio-gold); text-transform: uppercase; }
        .header-left p { margin: 5px 0 0; font-size: 11px; letter-spacing: 3px; opacity: 0.7; text-transform: uppercase; }
        .header-right .date { font-family: 'Cormorant Garamond'; font-size: 28px; color: var(--nio-gold); }

        .section-title { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: var(--nio-gold); margin: 40px 0 20px; border-left: 2px solid var(--nio-gold); padding-left: 10px; }

        /* TIMELINE DESIGN */
        .timeline-card { background: var(--surface); border: 1px solid var(--border); padding: 30px; margin-bottom: 20px; }
        .timeline-flex { display: flex; justify-content: space-between; position: relative; }
        .timeline-flex::before { content: ''; position: absolute; top: 12px; left: 0; right: 0; height: 1px; background: var(--border); z-index: 0; }
        .t-step { position: relative; z-index: 1; text-align: center; flex: 1; cursor: pointer; }
        .t-dot { width: 24px; height: 24px; background: var(--nio-dark); border: 2px solid var(--border); border-radius: 50%; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; font-size: 10px; transition: 0.3s; }
        .t-dot.done { background: var(--nio-green); border-color: var(--nio-green); color: #fff; }
        .t-dot.active { background: var(--nio-gold); border-color: var(--nio-gold); box-shadow: 0 0 10px var(--nio-gold); }
        .t-label { font-size: 10px; font-weight: 600; text-transform: uppercase; display: block; opacity: 0.8; }
        .t-sub { font-family: 'JetBrains Mono'; font-size: 9px; color: var(--nio-gold); }

        /* CHART & LEGEND */
        .chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 40px; }
        .chart-card { background: var(--surface); border: 1px solid var(--border); padding: 30px; }
        .chart-container { display: flex; align-items: center; gap: 30px; }
        .donut-box { position: relative; width: 150px; height: 150px; flex-shrink: 0; }
        .total-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; }
        .total-center b { font-family: 'Cormorant Garamond'; font-size: 28px; color: var(--nio-gold); display: block; line-height: 1; }
        .total-center span { font-size: 8px; text-transform: uppercase; opacity: 0.5; }
        
        .legend-list { flex-grow: 1; list-style: none; padding: 0; margin: 0; }
        .legend-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #ffffff05; font-size: 11px; cursor: pointer; }
        .legend-row:hover { background: #ffffff05; }
        .l-name { display: flex; align-items: center; gap: 8px; }
        .l-dot { width: 7px; height: 7px; border-radius: 50%; }
        .l-val { font-family: 'JetBrains Mono'; color: var(--nio-gold); text-align: right; }
        .l-pct { font-size: 9px; opacity: 0.4; margin-left: 5px; }

        /* TABLE FORMAT DROPDOWNS */
        .details-pane { display: none; margin-top: 15px; border-top: 1px solid var(--border); padding-top: 15px; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .table-scroll { max-height: 200px; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; text-align: left; }
        th { border-bottom: 1px solid var(--border); padding: 8px; opacity: 0.4; text-transform: uppercase; font-weight: 400; font-size: 9px; }
        td { padding: 8px; border-bottom: 1px solid #ffffff05; }
        .col-main { width: 70%; font-weight: 600; }
        .col-side { width: 30%; font-family: 'JetBrains Mono'; opacity: 0.6; text-align: right; }

        .donut { transform: rotate(-90deg); }
    </style>
</head>
